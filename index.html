<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio Pro - إزالة الخلفية باحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #e2e8f0; }
        .studio-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .canvas-shadow { box-shadow: 0 0 50px rgba(59, 130, 246, 0.15); }
        .bg-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        #videoSource { display: none; }
        .active-bg { border: 3px solid #3b82f6 !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="border-b border-slate-800 p-4 studio-gradient sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 00-2 2z" /></svg>
                </div>
                <h1 class="text-xl font-extrabold tracking-tight">AI STUDIO <span class="text-blue-500">PRO</span></h1>
            </div>
            <button onclick="location.reload()" class="text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition">فيديو جديد</button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        
        <!-- Sidebar: Background Library & Controls -->
        <aside class="w-full lg:w-96 border-l border-slate-800 flex flex-col studio-gradient order-2 lg:order-1">
            <div class="p-6 border-b border-slate-800">
                <h2 class="font-bold text-lg mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"></path></svg>
                    مكتبة الخلفيات الاحترافية
                </h2>
                <div class="flex gap-2 mb-4 overflow-x-auto pb-2 custom-scrollbar text-xs">
                    <button onclick="filterBgs('all')" class="bg-blue-600 px-3 py-1 rounded-full whitespace-nowrap">الكل</button>
                    <button onclick="filterBgs('office')" class="bg-slate-800 px-3 py-1 rounded-full whitespace-nowrap">مكاتب</button>
                    <button onclick="filterBgs('studio')" class="bg-slate-800 px-3 py-1 rounded-full whitespace-nowrap">استوديوهات</button>
                    <button onclick="filterBgs('home')" class="bg-slate-800 px-3 py-1 rounded-full whitespace-nowrap">منازل مودرن</button>
                </div>
            </div>

            <!-- Scrollable Backgrounds Grid -->
            <div id="bgGrid" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-3 custom-scrollbar">
                <!-- ستتم إضافة الخلفيات عبر الجافا سكريبت -->
            </div>

            <!-- Manual Controls -->
            <div class="p-6 bg-slate-900/50 border-t border-slate-800 space-y-4">
                <div class="space-y-2">
                    <div class="flex justify-between text-xs">
                        <span class="text-slate-400">تنعيم الحواف (AI Edge)</span>
                        <span id="featherLabel" class="text-blue-400 font-bold">4px</span>
                    </div>
                    <input type="range" id="featherRange" min="0" max="15" step="0.5" value="4" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between text-xs">
                        <span class="text-slate-400">تعتيم الخلفية (Blur)</span>
                        <span id="bgBlurLabel" class="text-blue-400 font-bold">0px</span>
                    </div>
                    <input type="range" id="bgBlurRange" min="0" max="20" step="1" value="0" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                </div>
            </div>
        </aside>

        <!-- Main Viewport -->
        <section class="flex-1 bg-black flex flex-col items-center justify-center p-4 relative order-1 lg:order-2">
            
            <!-- Welcome/Upload Box -->
            <div id="uploadZone" class="max-w-xl w-full text-center space-y-6 animate-fade-in">
                <div class="border-2 border-dashed border-slate-700 rounded-[2.5rem] p-16 hover:border-blue-500 transition-all bg-slate-900/20 group cursor-pointer" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" accept="video/*" class="hidden">
                    <div class="w-24 h-24 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                        <svg class="w-12 h-12 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                    </div>
                    <h3 class="text-2xl font-bold mb-2">ابدأ تجربة الاستوديو الاحترافية</h3>
                    <p class="text-slate-400">ارفع الفيديو الخاص بك وسيقوم الذكاء الاصطناعي بالباقي</p>
                </div>
                <div id="loadingStatus" class="hidden flex flex-col items-center gap-4">
                    <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-blue-400 font-bold">جاري تحميل محرك العزل السينمائي...</p>
                </div>
            </div>

            <!-- Canvas Container -->
            <div id="canvasWrapper" class="hidden w-full max-w-4xl relative canvas-shadow rounded-2xl overflow-hidden border border-slate-800">
                <canvas id="outputCanvas"></canvas>
                <div class="absolute bottom-4 right-4 flex gap-2">
                    <button id="playPauseBtn" class="bg-black/50 backdrop-blur-md hover:bg-black/80 p-3 rounded-full transition">
                        <svg id="playIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <video id="videoSource" playsinline loop muted></video>
    <!-- Hidden Layers for AI -->
    <canvas id="maskCanvas" style="display:none"></canvas>
    <img id="currentBgImg" style="display:none" src="">

    <script>
        // 1. مكتبة الخلفيات (30+ خلفية احترافية)
        const backgrounds = [
            { id: 'off1', cat: 'office', url: 'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=800&q=80' },
            { id: 'off2', cat: 'office', url: 'https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=800&q=80' },
            { id: 'off3', cat: 'office', url: 'https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=800&q=80' },
            { id: 'off4', cat: 'office', url: 'https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=800&q=80' },
            { id: 'stu1', cat: 'studio', url: 'https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=800&q=80' },
            { id: 'stu2', cat: 'studio', url: 'https://images.unsplash.com/photo-1478737270239-2f02b77fc618?auto=format&fit=crop&w=800&q=80' },
            { id: 'stu3', cat: 'studio', url: 'https://images.unsplash.com/photo-1524678606370-a47ad25cb82a?auto=format&fit=crop&w=800&q=80' },
            { id: 'hom1', cat: 'home', url: 'https://images.unsplash.com/photo-1616489953149-8f2378377e6f?auto=format&fit=crop&w=800&q=80' },
            { id: 'hom2', cat: 'home', url: 'https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?auto=format&fit=crop&w=800&q=80' },
            { id: 'hom3', cat: 'home', url: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80' },
            { id: 'hom4', cat: 'home', url: 'https://images.unsplash.com/photo-1615876234886-fd9a39faa97f?auto=format&fit=crop&w=800&q=80' },
            // إضافة المزيد لتصل لـ 30+
            ...Array.from({length: 20}, (_, i) => ({
                id: `extra${i}`,
                cat: i < 7 ? 'office' : (i < 14 ? 'home' : 'studio'),
                url: `https://source.unsplash.com/random/800x600?${i < 7 ? 'office' : (i < 14 ? 'interior' : 'studio')}&sig=${i}`
            }))
        ];

        const video = document.getElementById('videoSource');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const maskCanvas = document.getElementById('maskCanvas');
        const maskCtx = maskCanvas.getContext('2d');
        const bgImg = document.getElementById('currentBgImg');
        const bgGrid = document.getElementById('bgGrid');

        let selfieSegmentation;
        let isProcessing = false;

        // تهيئة واجهة الخلفيات
        function renderBgGrid(items) {
            bgGrid.innerHTML = '';
            items.forEach(bg => {
                const div = document.createElement('div');
                div.className = `bg-card relative aspect-video rounded-xl overflow-hidden border-2 border-transparent cursor-pointer transition-all duration-300`;
                div.innerHTML = `<img src="${bg.url}" class="w-full h-full object-cover">`;
                div.onclick = () => {
                    document.querySelectorAll('.bg-card').forEach(c => c.classList.remove('active-bg'));
                    div.classList.add('active-bg');
                    bgImg.src = bg.url;
                };
                bgGrid.appendChild(div);
            });
        }

        function filterBgs(cat) {
            const filtered = cat === 'all' ? backgrounds : backgrounds.filter(b => b.cat === cat);
            renderBgGrid(filtered);
        }

        // تهيئة محرك الذكاء الاصطناعي
        function initAI() {
            selfieSegmentation = new SelfieSegmentation({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
            });
            selfieSegmentation.setOptions({ modelSelection: 1 });
            selfieSegmentation.onResults(onResults);
        }

        function onResults(results) {
            if (canvas.width !== results.image.width) {
                canvas.width = results.image.width;
                canvas.height = results.image.height;
                maskCanvas.width = results.image.width;
                maskCanvas.height = results.image.height;
            }

            const feather = parseFloat(document.getElementById('featherRange').value);
            const bgBlur = parseInt(document.getElementById('bgBlurRange').value);

            // 1. معالجة القناع (Smoothing)
            maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
            maskCtx.save();
            if (feather > 0) maskCtx.filter = `blur(${feather}px)`;
            maskCtx.drawImage(results.segmentationMask, 0, 0, maskCanvas.width, maskCanvas.height);
            maskCtx.restore();

            // 2. الرسم النهائي (الترتيب السينمائي)
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // الطبقة الأساسية: الخلفية مع Blur إذا طلب المستخدم
            if (bgImg.src && bgImg.src !== window.location.href) {
                ctx.save();
                if (bgBlur > 0) ctx.filter = `blur(${bgBlur}px)`;
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
                ctx.restore();
            } else {
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // طبقة الشخص: باستخدام القناع المنعم
            ctx.globalCompositeOperation = 'destination-out';
            ctx.drawImage(maskCanvas, 0, 0, canvas.width, canvas.height);
            
            ctx.globalCompositeOperation = 'destination-over';
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            ctx.restore();
        }

        async function process() {
            if (video.paused || !isProcessing) return;
            await selfieSegmentation.send({image: video});
            requestAnimationFrame(process);
        }

        // تفاعلات المستخدم
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('uploadZone').classList.add('hidden');
            document.getElementById('loadingStatus').classList.remove('hidden');

            video.src = URL.createObjectURL(file);
            video.onloadeddata = () => {
                document.getElementById('loadingStatus').classList.add('hidden');
                document.getElementById('canvasWrapper').classList.remove('hidden');
                initAI();
                isProcessing = true;
                video.play();
                process();
            };
        };

        document.getElementById('playPauseBtn').onclick = () => {
            if (video.paused) { video.play(); isProcessing = true; process(); }
            else { video.pause(); isProcessing = false; }
        };

        document.getElementById('featherRange').oninput = (e) => {
            document.getElementById('featherLabel').innerText = e.target.value + 'px';
        };
        
        document.getElementById('bgBlurRange').oninput = (e) => {
            document.getElementById('bgBlurLabel').innerText = e.target.value + 'px';
        };

        // تشغيل أولي
        renderBgGrid(backgrounds);
        // تعيين خلفية افتراضية (أول مكتب)
        bgImg.src = backgrounds[0].url;

    </script>
</body>
</html>
