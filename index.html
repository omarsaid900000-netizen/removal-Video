<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio Pro v6.1 - النسخة المصلحة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #020617; color: #f1f5f9; height: 100vh; margin: 0; overflow: hidden; display: flex; flex-direction: column; }
        
        .app-wrapper { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 64px); }
        .sidebar { width: 360px; background: #0f172a; border-left: 1px solid #1e293b; display: flex; flex-direction: column; flex-shrink: 0; z-index: 50; overflow-y: auto; }
        .main-stage { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 20px; }
        
        .canvas-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #outputCanvas { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        .bg-card { cursor: pointer; border-radius: 10px; overflow: hidden; border: 2px solid transparent; transition: 0.2s; aspect-ratio: 16/9; background: #1e293b; position: relative; min-height: 80px; }
        .bg-card:hover { border-color: #3b82f6; }
        .bg-card.active { border-color: #3b82f6; ring: 4px rgba(59, 130, 246, 0.3); }
        .ai-panel { background: #111827; border: 1px solid #374151; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        input[type="range"] { accent-color: #3b82f6; width: 100%; }
        
        .loading-spin { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #3b82f6; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 1024px) {
            .app-wrapper { flex-direction: column-reverse; height: auto; }
            .sidebar { width: 100%; height: 50vh; }
            .main-stage { height: 50vh; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-blue-600 rounded-xl">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 00-2 2z" /></svg>
            </div>
            <h1 class="text-xl font-black text-blue-400">AI STUDIO <span class="text-white">PRO</span></h1>
        </div>
        <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-xs font-bold transition">مشروع جديد</button>
    </header>

    <div class="app-wrapper">
        <aside class="sidebar no-scrollbar">
            <div class="flex p-4 gap-2 sticky top-0 bg-[#0f172a] z-10">
                <button onclick="switchTab('lib')" id="tabLib" class="flex-1 py-2 text-[11px] font-bold bg-blue-600 rounded-lg">المكتبة</button>
                <button onclick="switchTab('ai')" id="tabAI" class="flex-1 py-2 text-[11px] font-bold bg-slate-800 rounded-lg">ذكاء Gemini ✨</button>
            </div>

            <div id="sectionLib" class="flex-1 flex flex-col">
                <div class="px-4 pb-4 flex gap-2 overflow-x-auto no-scrollbar shrink-0">
                    <button onclick="renderGrid('colors')" class="px-3 py-1 bg-slate-800 rounded-full text-[10px]">ألوان</button>
                    <button onclick="renderGrid('office')" class="px-3 py-1 bg-slate-800 rounded-full text-[10px]">مكاتب</button>
                    <button onclick="renderGrid('studio')" class="px-3 py-1 bg-slate-800 rounded-full text-[10px]">استوديو</button>
                    <button onclick="renderGrid('home')" class="px-3 py-1 bg-slate-800 rounded-full text-[10px]">منازل</button>
                </div>
                <div id="bgGrid" class="grid grid-cols-2 gap-3 p-4 content-start"></div>
            </div>

            <div id="sectionAI" class="hidden p-4 space-y-4">
                <div class="ai-panel">
                    <h3 class="text-xs font-bold text-blue-400 mb-2">توليد نص للفيديو ✨</h3>
                    <textarea id="aiScriptInput" placeholder="عن ماذا يتحدث فيديو اليوم؟" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-xs mb-3 outline-none focus:border-blue-500 min-h-[80px]"></textarea>
                    <button onclick="aiGenerateScript()" id="btnScript" class="w-full bg-blue-600 py-2 rounded-lg text-xs font-bold">توليد الآن</button>
                    <div id="aiScriptOut" class="mt-3 text-[11px] text-slate-300 p-2 bg-black/40 rounded hidden max-h-40 overflow-y-auto"></div>
                </div>
                <div class="ai-panel">
                    <h3 class="text-xs font-bold text-blue-400 mb-2">تحليل المشهد ✨</h3>
                    <button onclick="aiAnalyzeFrame()" id="btnAnalyze" class="w-full bg-emerald-600 py-2 rounded-lg text-xs font-bold">تحليل الإضاءة والمظهر</button>
                    <div id="aiAnalyzeOut" class="mt-3 text-[11px] text-slate-300 p-2 bg-black/40 rounded hidden"></div>
                </div>
                <div class="ai-panel">
                    <h3 class="text-xs font-bold text-blue-400 mb-2">توليد خلفية خيالية ✨</h3>
                    <input type="text" id="aiImageInput" placeholder="صف خلفية أحلامك..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs mb-2 outline-none">
                    <button onclick="aiGenerateImage()" id="btnImage" class="w-full bg-purple-600 py-2 rounded-lg text-xs font-bold">توليد الصورة</button>
                    <div id="imgLoad" class="hidden mt-2 text-center"><div class="loading-spin"></div> <span class="text-[10px]">جاري التوليد...</span></div>
                </div>
            </div>

            <div class="p-6 bg-slate-900 border-t border-slate-800 space-y-5 shrink-0">
                <div class="space-y-2">
                    <div class="flex justify-between text-xs font-bold">
                        <span class="text-slate-400 italic">تنعيم الحواف</span>
                        <span id="fVal" class="text-blue-400">5.0px</span>
                    </div>
                    <input type="range" id="fRange" min="0" max="20" step="0.5" value="5">
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between text-xs font-bold">
                        <span class="text-slate-400 italic">عزل الخلفية (Blur)</span>
                        <span id="bVal" class="text-blue-400">0px</span>
                    </div>
                    <input type="range" id="bRange" min="0" max="40" value="0">
                </div>
            </div>
        </aside>

        <main class="main-stage">
            <div id="dropZone" class="w-full max-w-xl p-12 border-4 border-dashed border-slate-800 rounded-[3rem] text-center bg-slate-900/10 cursor-pointer hover:border-blue-500 transition-all" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="video/*" class="hidden">
                <div class="w-20 h-20 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                </div>
                <h2 class="text-2xl font-black mb-2">ارفع الفيديو</h2>
                <p class="text-slate-500">سيعمل العزل والذكاء الاصطناعي فور الرفع</p>
            </div>
            <div id="loader" class="hidden flex flex-col items-center gap-4">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-blue-500 font-bold">جاري تفعيل الاستوديو...</p>
            </div>
            <div class="canvas-container">
                <canvas id="outputCanvas" class="hidden"></canvas>
            </div>
        </main>
    </div>

    <video id="vSource" playsinline loop muted style="display:none"></video>
    <canvas id="mCanvas" style="display:none"></canvas>
    <img id="bgActive" style="display:none" crossorigin="anonymous">

    <script>
        const apiKey = "";
        const library = {
            colors: [
                {id:'c1', t:'color', v:'#ffffff', n:'أبيض'},
                {id:'c2', t:'color', v:'#00ff00', n:'كروما'},
                {id:'c3', t:'color', v:'#000000', n:'أسود'},
                {id:'c4', t:'color', v:'#334155', n:'رمادي'}
            ],
            office: [
                {id:'o1', t:'img', u:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=1000'},
                {id:'o2', t:'img', u:'https://images.unsplash.com/photo-1497366811353-6870744d04b2?w=1000'}
            ],
            home: [
                {id:'h1', t:'img', u:'https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?w=1000'},
                {id:'h2', t:'img', u:'https://images.unsplash.com/photo-1616489953149-8f2378377e6f?w=1000'}
            ],
            studio: [
                {id:'s1', t:'img', u:'https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=1000'}
            ]
        };

        const v = document.getElementById('vSource');
        const c = document.getElementById('outputCanvas');
        const ctx = c.getContext('2d');
        const mc = document.getElementById('mCanvas');
        const mctx = mc.getContext('2d');
        const bgImg = document.getElementById('bgActive');

        let segmentation;
        let isRunning = false;
        let bgMode = 'color';
        let bgVal = '#ffffff';

        // --- Gemini AI ---
        async function fetchGemini(payload) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const res = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            return await res.json();
        }

        async function aiGenerateScript() {
            const pin = document.getElementById('aiScriptInput');
            const out = document.getElementById('aiScriptOut');
            const btn = document.getElementById('btnScript');
            if(!pin.value) return;
            btn.disabled = true; btn.innerHTML = '<div class="loading-spin"></div>';
            try {
                const res = await fetchGemini({ contents: [{ parts: [{ text: `اكتب سيناريو احترافي عن: ${pin.value}` }] }] });
                out.innerText = res.candidates[0].content.parts[0].text;
                out.classList.remove('hidden');
            } catch(e) { console.error(e); }
            finally { btn.disabled = false; btn.innerHTML = 'توليد الآن'; }
        }

        async function aiAnalyzeFrame() {
            if(!isRunning) return;
            const btn = document.getElementById('btnAnalyze');
            const out = document.getElementById('aiAnalyzeOut');
            btn.disabled = true; btn.innerHTML = '<div class="loading-spin"></div>';
            try {
                const frame = c.toDataURL('image/png').split(',')[1];
                const res = await fetchGemini({ contents: [{ parts: [{ text: "حلل الإضاءة وأعطني نصائح بالعربي." }, { inlineData: { mimeType: "image/png", data: frame } }] }] });
                out.innerText = res.candidates[0].content.parts[0].text;
                out.classList.remove('hidden');
            } catch(e) { console.error(e); }
            finally { btn.disabled = false; btn.innerHTML = 'تحليل الإضاءة والمظهر'; }
        }

        async function aiGenerateImage() {
            const pin = document.getElementById('aiImageInput');
            const load = document.getElementById('imgLoad');
            const btn = document.getElementById('btnImage');
            if(!pin.value) return;
            btn.disabled = true; load.classList.remove('hidden');
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                const res = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ instances: { prompt: pin.value }, parameters: { sampleCount: 1 } }) });
                const json = await res.json();
                bgMode = 'img';
                bgImg.src = `data:image/png;base64,${json.predictions[0].bytesBase64Encoded}`;
            } catch(e) { console.error(e); }
            finally { btn.disabled = false; load.classList.add('hidden'); }
        }

        // --- محرك المعالجة المصلح ---
        function onResults(results) {
            if (!isRunning) return;

            // تحديث المقاسات لتطابق الفيديو
            if(c.width !== results.image.width) {
                c.width = results.image.width;
                c.height = results.image.height;
                mc.width = results.image.width;
                mc.height = results.image.height;
            }

            const feather = parseFloat(document.getElementById('fRange').value);
            const blur = parseInt(document.getElementById('bRange').value);

            // الخطوة 1: رسم القناع على الكانفاس المخفي وتنعيمه
            mctx.clearRect(0, 0, mc.width, mc.height);
            mctx.save();
            if(feather > 0) mctx.filter = `blur(${feather}px)`;
            mctx.drawImage(results.segmentationMask, 0, 0, mc.width, mc.height);
            mctx.restore();

            // الخطوة 2: الرسم على الكانفاس الرئيسي
            ctx.save();
            ctx.clearRect(0, 0, c.width, c.height);

            // رسم الخلفية أولاً
            if(bgMode === 'img' && bgImg.complete && bgImg.src) {
                ctx.save();
                if(blur > 0) ctx.filter = `blur(${blur}px)`;
                const s = Math.max(c.width/bgImg.width, c.height/bgImg.height);
                const w = bgImg.width*s, h = bgImg.height*s;
                ctx.drawImage(bgImg, (c.width-w)/2, (c.height-h)/2, w, h);
                ctx.restore();
            } else {
                ctx.fillStyle = bgVal;
                ctx.fillRect(0, 0, c.width, c.height);
            }

            // رسم الشخص فوق الخلفية باستخدام القناع
            // نستخدم القناع لتحديد أين يتم "مسح" الخلفية أو أين يتم وضع الشخص
            ctx.globalCompositeOperation = 'destination-out';
            ctx.drawImage(mc, 0, 0, c.width, c.height);
            
            ctx.globalCompositeOperation = 'destination-over';
            ctx.drawImage(results.image, 0, 0, c.width, c.height);

            ctx.restore();
        }

        async function process() {
            if(v.paused || v.ended || !isRunning) return;
            await segmentation.send({image: v});
            requestAnimationFrame(process);
        }

        function switchTab(t) {
            document.getElementById('sectionLib').classList.toggle('hidden', t === 'ai');
            document.getElementById('sectionAI').classList.toggle('hidden', t === 'lib');
            document.getElementById('tabLib').classList.toggle('bg-blue-600', t === 'lib');
            document.getElementById('tabLib').classList.toggle('bg-slate-800', t === 'ai');
            document.getElementById('tabAI').classList.toggle('bg-blue-600', t === 'ai');
            document.getElementById('tabAI').classList.toggle('bg-slate-800', t === 'lib');
        }

        function renderGrid(cat) {
            const g = document.getElementById('bgGrid'); g.innerHTML = '';
            library[cat].forEach(i => {
                const d = document.createElement('div'); d.className = 'bg-card';
                if(i.t === 'color') {
                    d.style.backgroundColor = i.v;
                    d.innerHTML = `<div class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-black/50">${i.n}</div>`;
                    d.onclick = () => { bgMode='color'; bgVal=i.v; selectCard(d); };
                } else {
                    d.innerHTML = `<img src="${i.u}" class="w-full h-full object-cover">`;
                    d.onclick = () => { bgMode='img'; bgImg.src=i.u; selectCard(d); };
                }
                g.appendChild(d);
            });
        }

        function selectCard(el) { document.querySelectorAll('.bg-card').forEach(c=>c.classList.remove('active')); el.classList.add('active'); }

        document.getElementById('fileInput').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            document.getElementById('dropZone').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            
            const url = URL.createObjectURL(f);
            v.src = url;
            v.load(); // ضمان تحميل الفيديو

            v.onloadedmetadata = () => {
                document.getElementById('loader').classList.add('hidden');
                c.classList.remove('hidden');
                
                segmentation = new SelfieSegmentation({
                    locateFile: (f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`
                });
                segmentation.setOptions({modelSelection: 1});
                segmentation.onResults(onResults);
                
                isRunning = true;
                v.play().then(() => {
                    process();
                }).catch(err => console.error("Video play failed:", err));
            };
        };

        document.getElementById('fRange').oninput = (e) => document.getElementById('fVal').innerText = e.target.value + 'px';
        document.getElementById('bRange').oninput = (e) => document.getElementById('bVal').innerText = e.target.value + 'px';

        renderGrid('colors');
    </script>
</body>
</html>
